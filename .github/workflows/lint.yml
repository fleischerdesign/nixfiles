name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Check formatting (nixfmt)
        run: git ls-files '*.nix' | xargs -r nix fmt -- --check

      - name: Check dead code (deadnix)
        run: git ls-files '*.nix' | xargs -r nix run nixpkgs#deadnix -- --fail

      - name: Lint (statix)
        run: nix run nixpkgs#statix -- check
