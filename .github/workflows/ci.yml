name: CI

on:
  push:
    branches: [main]
    paths: [flake.nix, flake.lock, "hosts/**", "roles/**", "features/**", "overlays/**", "lib/**", "user/**", "media/**", "src/**"]
  pull_request:
    paths: [flake.nix, flake.lock, "hosts/**", "roles/**", "features/**", "overlays/**", "lib/**", "user/**", "media/**", "src/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  flake-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Check flake
        run: nix flake check --print-build-logs

  build:
    needs: flake-check
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        host: [yorke, jello, strummer, mackaye, rollins]
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/build-nixos-host
        with:
          host: ${{ matrix.host }}
          max-jobs: "2"
          attic-push-token: ${{ secrets.ATTIC_PUSH_TOKEN }}

  build-status:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ One or more builds failed"
            exit 1
          fi
          echo "✅ All systems built successfully"
