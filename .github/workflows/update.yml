name: Flake Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has-updates: ${{ steps.detect.outputs.has-updates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - id: detect
        run: |
          nix flake update
          if git diff --quiet flake.lock; then
            echo "has-updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated flake.lock
        if: steps.detect.outputs.has-updates == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-flake-lock
          path: flake.lock
          retention-days: 1

  create-pr:
    needs: prepare
    if: needs.prepare.outputs.has-updates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: updated-flake-lock

      - name: Generate changelog
        id: changelog
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            printf "changelog<<%s\n" "$EOF"
            echo "## Flake Update"
            echo
            echo "Built by CI on main — auto-merged."
            echo
            echo "### Updated Inputs"
            echo
            echo '```'
            git diff flake.lock | grep -E '^[-+].*"(lastModified|narHash|owner|repo|rev|type|url)"' | head -60
            echo '```'
            echo "$EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        id: create-pr
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          commit-message: "chore(deps): update flake inputs"
          title: "chore(deps): flake update"
          branch: flake-update
          delete-branch: true
          labels: |
            dependencies
            automated
          body: ${{ steps.changelog.outputs.changelog }}
