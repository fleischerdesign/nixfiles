name: Flake Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has-updates: ${{ steps.detect.outputs.has-updates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - id: detect
        run: |
          nix flake update
          if git diff --quiet flake.lock; then
            echo "has-updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated flake.lock
        if: steps.detect.outputs.has-updates == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-flake-lock
          path: flake.lock
          retention-days: 1

  build:
    needs: prepare
    if: needs.prepare.outputs.has-updates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        host: [yorke, jello, strummer, mackaye, rollins]
    steps:
      - uses: actions/checkout@v4

      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: updated-flake-lock

      - name: Free disk space
        run: sudo rm -rf /opt/hostedtoolcache /usr/local/.ghcup /usr/share/dotnet /usr/local/lib/android /usr/local/share/powershell 2>/dev/null; true

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            substituters = https://cache.rls.ancoris.ovh/nixfiles https://cache.nixos.org
            trusted-public-keys = nixfiles:awB26eXQsIRK6dU9tMhnDs5Ql9z+tSCy1BQL1PWX8JE= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Build ${{ matrix.host }}
        run: |
          nix build \
            --print-build-logs \
            --max-jobs 1 \
            ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel"

      - name: Push to binary cache
        run: |
          mkdir -p ~/.config/attic
          cat > ~/.config/attic/config.toml << 'ATTCEOF'
          default-server = "nixfiles-server"

          [servers.nixfiles-server]
          endpoint = "https://cache.rls.ancoris.ovh"
          token = "${{ secrets.ATTIC_PUSH_TOKEN }}"
          ATTCEOF
          chmod 600 ~/.config/attic/config.toml

          for i in 1 2 3; do
            nix shell nixpkgs#attic-client -c attic push nixfiles ./result && exit 0
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Push failed after 3 attempts"
          exit 1

  create-pr:
    needs: [prepare, build]
    if: needs.prepare.outputs.has-updates == 'true' && success()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: updated-flake-lock

      - name: Generate changelog
        run: |
          {
            echo "## Flake Update"
            echo
            echo "All hosts built successfully — auto-merge enabled."
            echo
            echo "### Updated Inputs"
            echo
            echo '```'
            git diff flake.lock | grep -E '^[-+].*"(lastModified|narHash|owner|repo|rev|type|url)"' | head -60
            echo '```'
          } > changelog.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        id: create-pr
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          commit-message: "chore(deps): update flake inputs"
          title: "chore(deps): flake update — ✅ pre-validated"
          branch: flake-update
          delete-branch: true
          labels: |
            dependencies
            automated
            ci-verified
          body-path: changelog.txt

      - name: Merge PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --admin
