name: Flake Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has-updates: ${{ steps.detect.outputs.has-updates }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - id: detect
        run: |
          nix flake update
          if git diff --quiet flake.lock; then
            echo "has-updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated flake.lock
        if: steps.detect.outputs.has-updates == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-flake-lock
          path: flake.lock
          retention-days: 1

  build:
    needs: prepare
    if: needs.prepare.outputs.has-updates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        host: [yorke, jello, strummer, mackaye, rollins]
    steps:
      - uses: actions/checkout@v4

      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: updated-flake-lock

      - uses: ./.github/actions/build-nixos-host
        with:
          host: ${{ matrix.host }}
          # Niedrigere Priorität, schont Runner-Ressourcen
          max-jobs: "1"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          attic-push-token: ${{ secrets.ATTIC_PUSH_TOKEN }}

  build-status:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ One or more builds failed"
            exit 1
          fi
          echo "✅ All systems built successfully"

  commit:
    needs: build-status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download updated flake.lock
        uses: actions/download-artifact@v4
        with:
          name: updated-flake-lock

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore(deps): update flake inputs"
          git push origin main
